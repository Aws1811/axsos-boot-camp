<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Likes</title>
        <link rel="stylesheet" href="likes.css">
    </head>
    <body>
        <nav><h1>Network</h1></nav>
        <h2>Your Feed</h2>
        <main>
            <section class="sideSec">
                <img src="494dd0c2b6ebdcdce6c69d0a637a7c65.jpg" alt="userimg">
                <a href="#">Add an avatar</a>
                <h2>James Doe</h2>
            </section>
            <div class="col">
                <section>
                    <article>
                        <h2>Neil M</h2>
                        <aside>
                            <p><span class="span1">9</span>like(s)</p>
                            <button class="button1">Like</button>
                        </aside>
                    </article>
                    <p>I just set up this new discord bot, let me know what you all think. <a href="#">Link</a> </p>
                </section>
                <section>
                    <article>
                        <h2>Nichole K</h2>
                        <aside>
                            <p><span class="span2">12</span>like(s)</p>
                            <button class="button2">Like</button>
                        </aside>
                    </article>
                    <p>Just finished  my <a href="#">next comic</a>, check it out. </p>
                </section>
                <section>
                    <article>
                        <h2>Jim R</h2>
                        <aside>
                            <p><span class="span3">9</span>like(s)</p>
                            <button class="button3">Like</button>
                        </aside>
                    </article>
                    <p>I can't stop listening to the <a href="#">new album</a>. </p>
                    <p>who else is liking it?</p>
                </section>
            </div>
        </main>
        <script src="likes.js"></script>
