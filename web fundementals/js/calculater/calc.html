<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>calculate</title>
        <link rel="stylesheet" href="calc.css">
    </head>
    <body>
        <div id="calculator">
            <p ><span class="result" >0 </span></p>
    <div id="display">
  <div class="row">
    <button  onclick="press(7)" >7</button>
    <button  onclick="press(8)">8</button>
    <button  onclick="press(9)">9</button>
    <button class="operator" onclick="diff(this)" >÷</button>
  </div>
  <div class="row">
    <button  onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button  onclick="press(6)">6</button>
    <button class="operator" >×</button>
  </div>
  <div class="row">
    <button onclick="press(1)">1</button>
    <button  onclick="press(2)">2</button>
    <button   onclick="press(3)">3</button>
    <button class="operator" onclick="minus(this)" >−</button>
  </div>
  <div class="row">
    <button onclick="reset(this)" >C</button>
    <button onclick="press(0)" >0</button>
    <button onclick="press('.')" >.</button>
    <button class="operator" onclick="plus(this)" >+</button>
  </div>
  <div class="row">
    <button id="equals" onclick="equal(this)">=</div>
  </div>
  </div>
<div>


        <script src="calc.js"></script>
    </body>
</html>
