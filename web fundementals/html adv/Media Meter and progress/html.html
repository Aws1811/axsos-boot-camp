<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Meter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <main>
        <h1>System Preformance Monitor</h1>
        <div>
            <section>
                <h3>🔥CPU Usage</h3>
                <meter value="61" min="0" max="100"></meter>
                <p>61% usage</p>
            </section>
            <section>
                <h3>🎃 RAM Usage</h3>
                <meter value="43" min="0" max="100"></meter>
                <p>6 GB of 16GB used</p>
            </section>
            <section>
                <h3>🚓 DIsk Usage</h3>
                <meter value="90" min="0" max="100"></meter>
                <p>420 GB of 512 GB used</p>
            </section>
            <section>
                <h3>👻File Transfer</h3>
                <meter value="70" min="0"max="100"></meter>
                <p>70% completed</p>
            </section>
            <section>
                <h3>🍳 Network Activity</h3>
                <meter value="26" min="0" max="100"></meter>
                <p>Current load: 30%</p>
            </section>
            <section>
                <h3>🚩 System Tasks</h3>
                <meter value="45" min="0" max="100"></meter>
                <p>Processing tasks: 45%</p>
            </section>
        </div>
    </main>


    <script src="script.js"></script>
</body>
</html>
