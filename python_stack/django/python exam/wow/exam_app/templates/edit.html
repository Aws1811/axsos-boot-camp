<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Game</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="container mt-4">
        <div class="row">
            <div>
                <h1> Welcome, {{user.first_name}}</h1>
                <p>User ID:{{user.id}}</p>
                <form action="/logout/" method="post">
                    {% csrf_token %}
                    <button class="btn btn-danger">Log Out</button>
                </form>
            </div>
            <div>
                <form action="/edit/game/{{show_game.id}}/" method="post">
                    {% csrf_token %}
                    <div>
                        <label for="game_name">Game Name</label>
                        <input type="text" name="game_name" class="form-control mb-2" value="{{show_game.game_name}}">
                    </div>
                    <div>
                        <label for="genre">Genre</label>
                        <select name="genre" >
                            <option value="{{show_game.genre}}"></option>
                        </select>
                    </div>
                    <div>
                        <label for="relese_date">Relese Date</label>
                        <input type="date" name="relese_date" class="form-control mb-2" value="{{show_game.relese_date}}">
                    </div>
                    <div>
                        <label for="description">Description</label>
                        <textarea name="description" class="form-control mb-2" value="{{show_game.description}}"></textarea>
                    </div>
                    <div>
                        <input type="hidden" name="game_id" value="{{show_game.id}}">
                    </div>
                    <button class="btn btn-primary">Apply</button>
                    <button class="btn btn-primary">Cancle</button>
                </form>
                <div>
                    {% if messages %}
                    <ul class="messages">
                        {% for message in messages %}
                        <li {% if message.tags %} class="{{ message.tags }}" {% endif %}>{{ message }}</li>
                        {% endfor %}
                    </ul>
                    {% endif %}
                </div>

            </div>

        </div>
</body>

</html>
