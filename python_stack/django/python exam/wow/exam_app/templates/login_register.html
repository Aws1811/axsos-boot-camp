<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <h2 class="mb-3">Registration</h2>
                    <form action="/register/" method="post">
                        {% csrf_token %}
                        <div>
                            <label for="first_name">First Name:</label>
                            <input type="text" name="first_name" class="form-control mb-2" placeholder="First Name"
                                required>
                        </div>

                        <div>
                            <label for="last_name">Last Name:</label>
                            <input type="text" name="last_name" class="form-control mb-2" placeholder="Last Name"
                                required>
                        </div>

                        <div>
                            <label for="email">Email:</label>
                            <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
                        </div>

                        <div>
                            <label for="passoword">Password:</label>
                            <input type="password" name="password" class="form-control mb-2" placeholder="Password"
                                required>
                        </div>

                        <div>
                            <label for="confirm_pw">Confirm Password:</label>
                            <input type="password" name="confirm_pw" class="form-control mb-2"
                                placeholder="Confirm Password" required>
                        </div>
                        <!-- <div>
                            <label for="birthday">Birthday:</label>
                            <input type="date" name="birthday" class="form-control mb-2">
                        </div> -->
                        <div>
                            <label for="avatar">Avatar</label>
                            <input type="file" name="avatar" class="form-control mb-2">
                        </div>
                        <div>
                            <button class="btn btn-primary">Create Account</button>
                        </div>

                    </form>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <h2 class="mb-3">Login</h2>
                    <form action="/login/" method="post">
                        {% csrf_token %}
                        <div>
                            <label for="email">Email:</label>
                            <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
                        </div>
                        <div>
                            <label for="password">Password:</label>
                            <input type="password" name="password" class="form-control mb-2" placeholder="Password"
                                required>
                        </div>
                        <button class="btn btn-success ">Sign In</button>
                    </form>
                </div>
            </div>
            <div>
                {% if messages %}
                <ul class="messages">
                    {% for message in messages %}
                    <li {% if message.tags %} class="{{ message.tags }}" {% endif %}>{{ message }}</li>
                    {% endfor %}
                </ul>
                {% endif %}
            </div>
        </div>
    </div>
</body>

</html>

</body>

</html>
