<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Info</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="container mt-4">
        <div class="row">
            <div>
                <p>Game Name:{{games_get.game_name}}</p>
                <p>Genre:{{games_get.genre}}</p>
                <p>Description:{{games_get.description}}</p>
                <p>created_by:{{games_get.created_at}}</p>
            </div>
            <div>
                <a href="/edit/game/{{games_get.id}}/" class="btn btn-primary">Edit</a>
                <form action="/delete/{{games_get.id}}/" method="post">
                    {% csrf_token %}
                    <button class="btn btn-primary">Delete</button>
                </form>
        <!-- <a href="" class="btn btn-primary">Delete</a> -->
            </div>
        </div>
        <div>
        {% if user in game.favorites.all %}
        <a href="/game/{{game.id}}/favorite/">Add to Favorites</a>
        {% endif %}
        </div>
<form action="/game/{{game.id}}/" method="post">
    <select name="Rate">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
    </select>
</form>
    </div>
</body>

</html>
