<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css' ) }}">
</head>
<body>
    <main style="--color1: {{ color1 }}; --color2: {{ color2 }}; width: calc(100px * {{ x }}) ;">
    {% if x%4 ==0 and y%4 ==0 %}
        {% for i in range(x*y//2) %}
            {% if i%2 ==0 %}
        <section>
            <div class="red" ></div>
            <div class="black" ></div>
        </section>
        <section>
            <div class="black" ></div>
            <div class="red"></div>
        </section>
            {% endif %}
        {% endfor %}
    {% else %}
    <h1> this won't work you need to give a number divide by 4</h1>
    {% endif %}
    </main>
</body>
</html>
