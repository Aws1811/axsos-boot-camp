<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="display: flex; gap: 4em; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh;">
    <h1>Welcome!</h1>
    <main style="display: flex; gap: 2em; flex-wrap: wrap; max-width: 104em;">
        {% for i in range(1,x,1) %}

            {% if i % 5 ==0 %}

                <div style="width: 100px; height: 100px; background-color: #ff0000; border: 2px solid black;  "> <h2 style="text-align: center;">Aws</h2></div>
            {% else %}

                <div style="width: 100px; height: 100px;background-color: {{ colors }} ; border: 2px solid black;"> <h2 style="text-align: center; color: rgb(170, 255, 0); font-family: sans-serif; text-shadow: 2px 2px 4px black;">Aws</h2></div>
            {% endif %}

        {% endfor %}
    </main>
</body>
</html>
